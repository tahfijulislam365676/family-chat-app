<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Chat - মেসেঞ্জার</title>
    <style>
        /* আপনার ডিজাইন অপরিবর্তিত রাখা হয়েছে */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .back-btn { font-size: 24px; cursor: pointer; text-decoration: none; color: white; }
        .avatar { width: 40px; height: 40px; background: #128c7e; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .call-icons span { font-size: 22px; cursor: pointer; margin-left: 15px; }
        #msgArea { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 15px; line-height: 1.4; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        footer { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #messageInput { flex: 1; padding: 12px 15px; border-radius: 25px; border: none; outline: none; font-size: 16px; }
        #sendBtn { background: #128c7e; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .call-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
        video { width: 90%; border-radius: 15px; border: 2px solid #128c7e; background: #222; }
        #remoteVideo { width: 90%; margin-top: 10px; }
        #localVideo { width: 30%; position: absolute; bottom: 100px; right: 20px; border: 2px solid white; z-index: 210; }
        .end-call-btn { margin-top: 30px; background: #ff3b30; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="user-info">
            <a href="home.html" class="back-btn">←</a>
            <div class="avatar" id="avatarIcon">?</div>
            <div>
                <h4 id="chattingWithName">লোড হচ্ছে...</h4>
                <small style="opacity: 0.8;">অনলাইন</small>
            </div>
        </div>
        <div class="call-icons">
            <span onclick="startCall('অডিও')">📞</span>
            <span onclick="startCall('ভিডিও')">📹</span>
        </div>
    </header>

    <div id="msgArea"></div>

    <div id="callOverlay" class="call-overlay">
        <h2 id="callStatus" style="margin-bottom: 20px;">কল হচ্ছে...</h2>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <button class="end-call-btn" onclick="endCall()">কল কাটুন</button>
    </div>

    <footer>
        <input type="text" id="messageInput" placeholder="একটি মেসেজ লিখুন...">
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>

    <script>
        // সকেট কানেকশন আপনার Render লিংকে সেট করা হয়েছে
        const socket = io("https://family-chat-8jfi.onrender.com", {
            transports: ['websocket', 'polling'],
            upgrade: true
        });

        const urlParams = new URLSearchParams(window.location.search);
        const friendName = urlParams.get('name'); 
        const friendPhone = urlParams.get('phone'); 
        const myPhone = localStorage.getItem('loggedInUser'); 

        let myStream;
        let peer;

        const peerConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        if(friendName) {
            document.getElementById('chattingWithName').innerText = friendName;
            document.getElementById('avatarIcon').innerText = friendName[0].toUpperCase();
        }

        // কানেকশন হওয়ার সাথে সাথে জয়েন মেসেজ পাঠানো
        socket.on('connect', () => {
            if(myPhone) {
                console.log("সার্ভারে যুক্ত হয়েছি");
                socket.emit('join', myPhone);
            }
        });

        async function loadOldMessages() {
            if(!myPhone || !friendPhone) return;
            try {
                const res = await fetch(`/api/get-messages?from=${myPhone}&to=${friendPhone}`);
                const data = await res.json();
                if(data.success) {
                    const area = document.getElementById('msgArea');
                    area.innerHTML = ""; 
                    data.messages.forEach(m => {
                        appendMessage(m.message, m.sender === myPhone ? 'sent' : 'received');
                    });
                }
            } catch (err) { console.error("মেসেজ লোড করা যায়নি"); }
        }
        
        window.onload = loadOldMessages;

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if(message !== "" && myPhone && friendPhone) {
                const data = { from: myPhone, to: friendPhone, msg: message };
                socket.emit('send-msg', data); 
                appendMessage(message, 'sent');
                input.value = "";
            }
        }

        function appendMessage(msg, type) {
            const area = document.getElementById('msgArea');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = msg;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        socket.on('receive-msg', (data) => {
            if(data.from === friendPhone) {
                appendMessage(data.msg, 'received');
            }
        });

        async function startCall(type) {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({
                    video: type === 'ভিডিও',
                    audio: true
                });
                
                document.getElementById('callOverlay').style.display = 'flex';
                document.getElementById('localVideo').srcObject = myStream;
                document.getElementById('callStatus').innerText = "কল যাচ্ছে...";

                peer = new SimplePeer({ 
                    initiator: true, 
                    trickle: false, 
                    stream: myStream,
                    config: peerConfig 
                });

                peer.on('signal', signal => {
                    socket.emit('call-user', { from: myPhone, to: friendPhone, signal: signal, type: type });
                });

                peer.on('stream', stream => {
                    document.getElementById('remoteVideo').srcObject = stream;
                    document.getElementById('callStatus').innerText = "কথা বলুন";
                });

            } catch (err) {
                alert("ক্যামেরা বা মাইক্রোফোন পারমিশন দিন!");
                document.getElementById('callOverlay').style.display = 'none';
            }
        }

        socket.on('incoming-call', async (data) => {
            if(data.from === friendPhone) {
                const accept = confirm(`${friendName} থেকে ${data.type} কল আসছে। রিসিভ করবেন?`);
                if(accept) {
                    document.getElementById('callOverlay').style.display = 'flex';
                    try {
                        myStream = await navigator.mediaDevices.getUserMedia({ 
                            video: data.type === 'ভিডিও', 
                            audio: true 
                        });
                        document.getElementById('localVideo').srcObject = myStream;

                        peer = new SimplePeer({ 
                            initiator: false, 
                            trickle: false, 
                            stream: myStream,
                            config: peerConfig 
                        });

                        peer.on('signal', signal => {
                            socket.emit('answer-call', { signal: signal, to: data.from });
                        });

                        peer.on('stream', stream => {
                            document.getElementById('remoteVideo').srcObject = stream;
                            document.getElementById('callStatus').innerText = "কথা বলুন";
                        });

                        peer.signal(data.signal);
                    } catch (e) {
                        alert("কল রিসিভ করতে সমস্যা হয়েছে!");
                    }
                }
            }
        });

        socket.on('call-accepted', signal => {
            if(peer) peer.signal(signal);
        });

        function endCall() {
            if(myStream) {
                myStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('callOverlay').style.display = 'none';
            socket.emit('end-call', { to: friendPhone });
            location.reload(); 
        }

        socket.on('call-ended', () => {
            alert("কল শেষ হয়েছে");
            location.reload();
        });

        document.getElementById('messageInput').addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
